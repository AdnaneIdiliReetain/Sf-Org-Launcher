name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller "SF Org Launcher.spec" --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SF-Org-Launcher-Windows
          path: dist/SF Org Launcher.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app bundle
        run: pyinstaller "SF Org Launcher.spec" --noconfirm

      - name: Ad-hoc sign and strip quarantine
        run: |
          codesign --force --deep -s - "dist/SF Org Launcher.app"
          xattr -cr "dist/SF Org Launcher.app"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "SF Org Launcher" \
            -srcfolder "dist/SF Org Launcher.app" \
            -ov -format UDZO \
            "dist/SF-Org-Launcher-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SF-Org-Launcher-macOS
          path: dist/SF-Org-Launcher-macOS.dmg

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename files for release
        run: |
          mv "artifacts/SF-Org-Launcher-Windows/SF Org Launcher.exe" \
             "artifacts/SF-Org-Launcher-Windows.exe"
          mv "artifacts/SF-Org-Launcher-macOS/SF-Org-Launcher-macOS.dmg" \
             "artifacts/SF-Org-Launcher-macOS.dmg"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/SF-Org-Launcher-Windows.exe
            artifacts/SF-Org-Launcher-macOS.dmg
