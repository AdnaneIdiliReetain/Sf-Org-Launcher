name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: SF-Org-Launcher-Windows.exe
            build_name: SF Org Launcher
          - os: macos-latest
            artifact: SF-Org-Launcher-macOS
            build_name: SF Org Launcher

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --noconsole --name "${{ matrix.build_name }}" org_launcher.py

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mv "dist/${{ matrix.build_name }}.exe" "dist/${{ matrix.artifact }}"

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x "dist/${{ matrix.build_name }}"
          mv "dist/${{ matrix.build_name }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
